<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - WMC Executive Private Hire</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #000 0%, #1a1a1a 100%);
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #000;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #D4AF37;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            background: #D4AF37;
            color: #000;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-button:hover {
            background: #c19b2e;
        }
        
        .login-button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>WMC Executive</h1>
                <p>Admin Dashboard Login</p>
            </div>
            
            <div id="alertBox" style="display: none;"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                    <span class="error-message" id="usernameError"></span>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                    <span class="error-message" id="passwordError"></span>
                </div>
                
                <button type="submit" class="login-button" id="loginButton">Login</button>
            </form>
            
            <div class="login-link" style="text-align: center; margin-top: 20px; color: #666;">
                Don't have an account? <a href="register.html" style="color: #D4AF37; text-decoration: none; font-weight: 600;">Register here</a>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous errors
            document.getElementById('usernameError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('alertBox').style.display = 'none';
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginButton = document.getElementById('loginButton');
            
            // Validation
            if (!username) {
                document.getElementById('usernameError').textContent = 'Username is required';
                return;
            }
            
            if (!password) {
                document.getElementById('passwordError').textContent = 'Password is required';
                return;
            }
            
            // Show loading state
            loginButton.textContent = 'Logging in...';
            loginButton.disabled = true;
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store token if provided
                    if (data.data.token) {
                        localStorage.setItem('adminToken', data.data.token);
                    }
                    
                    // Redirect to dashboard
                    window.location.href = '/admin';
                } else {
                    // Show error
                    const alertBox = document.getElementById('alertBox');
                    alertBox.className = 'alert alert-error';
                    alertBox.textContent = data.message || 'Login failed. Please try again.';
                    alertBox.style.display = 'block';
                    
                    loginButton.textContent = 'Login';
                    loginButton.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                const alertBox = document.getElementById('alertBox');
                alertBox.className = 'alert alert-error';
                alertBox.textContent = 'An error occurred. Please try again.';
                alertBox.style.display = 'block';
                
                loginButton.textContent = 'Login';
                loginButton.disabled = false;
            }
        });
    </script>
</body>
</html>
